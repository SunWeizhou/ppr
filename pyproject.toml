[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E501", "F401", "F841"]

[tool.ruff.lint.per-file-ignores]
"app/routes/api/__init__.py" = ["E402"]
"web_server.py" = ["F811", "E402"]
"config_manager.py" = ["F811"]
"state_store.py" = ["E402"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
check_untyped_defs = false
