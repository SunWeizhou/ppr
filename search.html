<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关键词搜索 - arXiv Recommender</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh; color: #e0e0e0; padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            text-align: center; padding: 40px 20px;
            background: rgba(255,255,255,0.03); border-radius: 24px;
            margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.08);
        }
        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 50%, #f472b6 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }
        .nav-tabs {
            display: flex; justify-content: center; gap: 12px;
            margin-bottom: 25px; flex-wrap: wrap;
        }
        .nav-tab {
            padding: 10px 20px; background: rgba(255,255,255,0.05);
            border-radius: 10px; color: #888; text-decoration: none;
            transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-tab:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .nav-tab.active { background: rgba(124,58,237,0.3); color: #fff; }
        .search-box {
            display: flex; justify-content: center; gap: 15px;
            margin-bottom: 30px; flex-wrap: wrap;
        }
        .search-input {
            width: 500px; max-width: 100%; padding: 15px 20px;
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3); color: #fff; font-size: 1em;
        }
        .search-btn {
            padding: 15px 30px; border-radius: 12px;
            border: none; background: linear-gradient(135deg, #7c3aed, #00d4ff);
            color: #fff; font-size: 1em; cursor: pointer;
        }
        .coming-soon {
            text-align: center; padding: 80px 20px;
            color: #888; font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 关键词搜索</h1>
            <p style="color: #888; margin-top: 10px;">搜索 arXiv 论文</p>
        </div>
        <div class="nav-tabs">
            <a href="index.html" class="nav-tab">📅 今日推荐</a>
            <a href="search.html" class="nav-tab active">🔍 关键词搜索</a>
            <a href="journal.html" class="nav-tab">📚 顶刊追踪</a>
            <a href="scholars.html" class="nav-tab">🎓 学者追踪</a>
            <a href="liked.html" class="nav-tab">❤️ 我喜欢的</a>
        </div>
        <div class="search-box">
            <input type="text" class="search-input" id="keywords" placeholder="输入关键词，用逗号分隔...">
            <button class="search-btn" onclick="search()">搜索</button>
        </div>
        <div class="coming-soon">
            <p>🚧 功能开发中...</p>
            <p style="margin-top: 10px; font-size: 0.9em;">请在命令行运行: python arxiv_recommender_v5.py --search "关键词1,关键词2"</p>
        </div>
    </div>
</body>
</html>
