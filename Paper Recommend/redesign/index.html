<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StatDesk — Research Triage Desk · v2 Redesign</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="i18n.js"></script>
  <script src="data.js"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="pages_1.jsx"></script>
  <script type="text/babel" src="pages_2.jsx"></script>
  <script type="text/babel" src="spec.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [page, setPage] = useState(() => localStorage.getItem("sd_page") || "inbox");
      useEffect(() => { localStorage.setItem("sd_page", page); }, [page]);

      return (
        <div className="app" data-screen-label={
          {inbox:"01 Inbox", queue:"02 Queue", library:"03 Library",
           monitor:"04 Monitor", settings:"05 Settings", spec:"06 Design Spec"}[page]
        }>
          <SideNav active={page} onNav={setPage} />
          <main className="main">
            {page === "inbox"    && <InboxPage/>}
            {page === "queue"    && <QueuePage/>}
            {page === "library"  && <LibraryPage/>}
            {page === "monitor"  && <MonitorPage/>}
            {page === "settings" && <SettingsPage/>}
            {page === "spec"     && <SpecPage/>}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
